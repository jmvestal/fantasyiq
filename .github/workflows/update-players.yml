name: Update Players JSON

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6am UTC
  workflow_dispatch:        # Manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch players from Sleeper API and write players.json
        run: |
          node << 'EOF'
          const https = require('https');
          const fs   = require('fs');

          const VALID_POS = new Set([
            'QB','RB','WR','TE','K','DEF','DST',
            'DE','DT','LB','CB','S','FS','SS','DB',
            'OLB','ILB','MLB','DL','IDP'
          ]);

          const SKIP_STATUS = new Set([
            'Inactive','Retired','Reserve/Retired','Reserve/PUP'
          ]);

          console.log('Fetching https://api.sleeper.app/v1/players/nfl …');

          https.get('https://api.sleeper.app/v1/players/nfl', res => {
            if (res.statusCode !== 200) {
              console.error('HTTP ' + res.statusCode);
              process.exit(1);
            }
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              const raw = JSON.parse(body);

              const players = Object.values(raw)
                .filter(p =>
                  p.full_name &&
                  VALID_POS.has(p.position) &&
                  p.active === true &&
                  p.team &&
                  p.team !== 'FA' &&
                  p.team !== 'Free Agent' &&
                  !SKIP_STATUS.has(p.status) &&
                  (p.search_rank || 0) < 2500
                )
                .map(p => ({
                  id:          p.player_id,
                  player_id:   p.player_id,
                  full_name:   p.full_name,
                  position:    p.position,
                  team:        p.team,
                  age:         p.age        || null,
                  years_exp:   p.years_exp  || 0,
                  search_rank: p.search_rank || 999,
                  trend:       'flat',
                  rookie:      (p.years_exp || 0) === 0,
                }));

              const out = {
                updated: new Date().toISOString(),
                count:   players.length,
                players
              };

              fs.writeFileSync('players.json', JSON.stringify(out));
              console.log('Wrote ' + players.length + ' players to players.json');
            });
          }).on('error', err => {
            console.error('Fetch failed:', err.message);
            process.exit(1);
          });
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json
          if git diff --staged --quiet; then
            echo "players.json unchanged — nothing to commit"
          else
            git commit -m "chore: update players.json [$(date -u +%Y-%m-%d)]"
            git push
          fi
