name: Update Players + Rankings

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6am UTC
  workflow_dispatch:        # Manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Fetch players.json from Sleeper
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');

          const VALID_POS  = new Set(['QB','RB','WR','TE','K','DEF','DST','DE','DT','LB','CB','S','FS','SS','DB','OLB','ILB','MLB','DL','IDP']);
          const SKIP_STATUS = new Set(['Inactive','Retired','Reserve/Retired','Reserve/PUP']);

          console.log('Fetching Sleeper players…');
          https.get('https://api.sleeper.app/v1/players/nfl', res => {
            let body = '';
            res.on('data', c => body += c);
            res.on('end', () => {
              const raw = JSON.parse(body);
              const players = Object.values(raw)
                .filter(p => p.full_name && VALID_POS.has(p.position) && p.active === true &&
                  p.team && p.team !== 'FA' && p.team !== 'Free Agent' &&
                  !SKIP_STATUS.has(p.status) && (p.search_rank || 0) < 2500)
                .map(p => ({
                  id: p.player_id, player_id: p.player_id, full_name: p.full_name,
                  position: p.position, team: p.team, age: p.age || null,
                  years_exp: p.years_exp || 0, search_rank: p.search_rank || 999,
                  trend: 'flat', rookie: (p.years_exp || 0) === 0,
                }));
              fs.writeFileSync('players.json', JSON.stringify({ updated: new Date().toISOString(), count: players.length, players }));
              console.log('players.json: ' + players.length + ' players');
            });
          }).on('error', e => { console.error(e.message); process.exit(1); });
          EOF

      - name: Fetch rankings.json from all sources
        run: |
          node << 'JSEOF'
          const https = require('https');
          const http  = require('http');
          const fs    = require('fs');

          // ── helpers ────────────────────────────────────────────
          const norm = s => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');

          function fetchUrl(url, timeoutMs = 15000, extraHeaders = {}) {
            return new Promise((resolve, reject) => {
              const lib = url.startsWith('https') ? https : http;
              const req = lib.get(url, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                  'Accept': 'application/json, text/plain, */*',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Accept-Encoding': 'gzip, deflate, br',
                  'Cache-Control': 'no-cache',
                  'Pragma': 'no-cache',
                  'Sec-Fetch-Dest': 'empty',
                  'Sec-Fetch-Mode': 'cors',
                  'Sec-Fetch-Site': 'same-origin',
                  ...extraHeaders,
                }
              }, res => {
                // Follow redirects
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return fetchUrl(res.headers.location, timeoutMs, extraHeaders).then(resolve).catch(reject);
                }
                if (res.statusCode !== 200) return reject(new Error('HTTP ' + res.statusCode + ' — ' + url));
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => resolve(body));
              });
              req.setTimeout(timeoutMs, () => { req.destroy(); reject(new Error('Timeout: ' + url)); });
              req.on('error', reject);
            });
          }

          const fetchJson = async (url, extraHeaders = {}) => JSON.parse(await fetchUrl(url, 15000, extraHeaders));
          const rankToVal = (rank, total) => Math.round(Math.max(100, Math.min(9800, 10000 * Math.exp(-0.012 * (rank - 1)))));

          // ── main ───────────────────────────────────────────────
          async function main() {
            const out = { updated: new Date().toISOString(), fc: {}, ktc: {}, ffc: {}, dp: {} };
            const yr  = new Date().getFullYear();

            // ── 1. FANTASYCALC ──────────────────────────────────
            try {
              console.log('Fetching FantasyCalc…');
              const [dyn1, dynSF, rdf] = await Promise.all([
                fetchJson('https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=1&numTeams=12&ppr=1&includeAdp=false'),
                fetchJson('https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&numTeams=12&ppr=1&includeAdp=false'),
                fetchJson('https://api.fantasycalc.com/values/current?isDynasty=false&numQbs=1&numTeams=12&ppr=1&includeAdp=false'),
              ]);
              const sfMap = {};
              (dynSF || []).forEach(i => { if (i.player?.name) sfMap[norm(i.player.name)] = i.value || 0; });
              const rdMap = {};
              (rdf  || []).forEach(i => { if (i.player?.name) rdMap[norm(i.player.name)] = i.value || 0; });
              (dyn1 || []).forEach(i => {
                if (!i.player?.name) return;
                const k = norm(i.player.name);
                out.fc[k] = {
                  dv:    i.value || 0,
                  dv_sf: sfMap[k] || i.value || 0,
                  rv:    rdMap[k] || 0,
                  trend: (i.trend > 0 ? 'up' : i.trend < 0 ? 'down' : 'flat'),
                  name:  i.player.name,
                  pos:   i.player.position || '',
                  team:  i.player.maybeTeam || '',
                  age:   i.player.age || null,
                  sid:   i.player.sleeperId || null,
                };
              });
              console.log('FantasyCalc: ' + Object.keys(out.fc).length + ' players');
            } catch(e) { console.error('FantasyCalc failed:', e.message); }

            // ── 2. KEEPTRADECUT ────────────────────────────────
            try {
              console.log('Fetching KTC…');
              const KTC = 'https://keeptradecut.com/fantasy-api/queue?format=1&filters=QB|WR|RB|TE|RDP&page=0&perPage=500&dynasty=1';
              const ktcRaw = await fetchUrl(KTC, 15000, {
                'Referer': 'https://keeptradecut.com/dynasty-rankings',
                'Origin': 'https://keeptradecut.com',
              });
              if (ktcRaw.trimStart().startsWith('<')) throw new Error('KTC returned HTML — likely bot-blocked');
              const data = JSON.parse(ktcRaw);
              (data || []).forEach(p => {
                if (!p.playerName) return;
                const k     = norm(p.playerName);
                const dv    = p.oneQBValues?.value       || p.superflexValues?.value || 0;
                const dv_sf = p.superflexValues?.value   || dv;
                const rv    = p.oneQBValues?.redraftValue || Math.round(dv * 0.82);
                const t     = p.oneQBValues?.trend;
                out.ktc[k]  = {
                  dv, dv_sf, rv,
                  trend: t > 50 ? 'up' : t < -50 ? 'down' : 'flat',
                  name:  p.playerName,
                  pos:   p.position || '',
                  team:  p.teamAbv   || '',
                  age:   p.age       || null,
                };
              });
              console.log('KTC: ' + Object.keys(out.ktc).length + ' players');
            } catch(e) { console.error('KTC failed:', e.message); }

            // ── 3. FANTASY FOOTBALL CALCULATOR (redraft PPR) ──
            try {
              console.log('Fetching FF Calculator…');
              const FFC = `https://fantasyfootballcalculator.com/api/v1/adp/ppr?teams=12&year=${yr}&position=all`;
              const data = await fetchJson(FFC);
              (data?.players || []).forEach(p => {
                if (!p.name) return;
                const k   = norm(p.name);
                const adp = p.adp || p.average_pick || 999;
                out.ffc[k] = { dv: 0, rv: rankToVal(adp, data.players.length), name: p.name, pos: (p.position||'').toUpperCase() };
              });
              console.log('FFC: ' + Object.keys(out.ffc).length + ' players');
            } catch(e) { console.error('FFC failed:', e.message); }

            // ── 4. DYNASTYPROCESS values-players.csv (actual 0-10000 dynasty values) ──
            try {
              console.log('Fetching DynastyProcess values…');
              // values-players.csv has value_1qb / value_2qb already on 0-10000 scale
              const DP_VAL = 'https://raw.githubusercontent.com/dynastyprocess/data/master/files/values-players.csv';
              const txt = await fetchUrl(DP_VAL);
              const lines = txt.replace(/\r\n/g,'\n').trim().split('\n');
              const hdr   = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
              const nmIdx  = hdr.indexOf('player');
              const psIdx  = hdr.indexOf('pos');
              const tmIdx  = hdr.indexOf('team');
              const ageIdx = hdr.indexOf('age');
              const v1Idx  = hdr.indexOf('value_1qb');
              const v2Idx  = hdr.indexOf('value_2qb');
              const e1Idx  = hdr.indexOf('ecr_1qb');
              if (nmIdx === -1 || v1Idx === -1) throw new Error('Unexpected CSV columns: ' + hdr.join(','));
              for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim().replace(/"/g,''));
                const name = cols[nmIdx]; if (!name) continue;
                const pos  = (cols[psIdx] || '').toUpperCase();
                if (pos === 'K' || pos === 'DST' || pos === 'DEF' || pos === 'PICK') continue;
                const dv   = parseFloat(cols[v1Idx]) || 0;
                const dv_sf= v2Idx >= 0 ? parseFloat(cols[v2Idx]) || dv : dv;
                const age  = ageIdx >= 0 ? parseFloat(cols[ageIdx]) || null : null;
                const k    = norm(name);
                out.dp[k]  = { dv, dv_sf, rv: 0, name, pos, team: cols[tmIdx]||'', age };
                // Note: ktc slot left empty — KTC /fantasy-api/queue is 404 (API removed)
              }
              console.log('DynastyProcess values: dp=' + Object.keys(out.dp).length + ' ktc-backfill=' + Object.keys(out.ktc).length);
            } catch(e) { console.error('DynastyProcess failed:', e.message); }

            // ── 4b. DYNASTYPROCESS ECR (redraft rv) ────────────
            try {
              console.log('Fetching DynastyProcess ECR for redraft rv…');
              const DP_ECR = 'https://raw.githubusercontent.com/dynastyprocess/data/master/files/db_fpecr_latest.csv';
              const txt2   = await fetchUrl(DP_ECR);
              const lines2 = txt2.replace(/\r\n/g,'\n').trim().split('\n');
              const hdr2   = lines2[0].toLowerCase().split(',').map(h => h.trim().replace(/"/g,''));
              const nmIdx2 = hdr2.findIndex(h => h.includes('player') || h === 'name' || h === 'fp_player_name');
              const rkIdx2 = hdr2.findIndex(h => h === 'ecr' || h.includes('rank') || h === 'avg');
              const psIdx2 = hdr2.findIndex(h => h === 'pos' || h === 'position');
              const entries2 = [];
              for (let i = 1; i < lines2.length; i++) {
                const cols = lines2[i].split(',').map(c => c.trim().replace(/"/g,''));
                const name = cols[nmIdx2]; if (!name) continue;
                const rank = rkIdx2 >= 0 ? parseFloat(cols[rkIdx2]) : i;
                const pos  = psIdx2 >= 0 ? (cols[psIdx2]||'').toUpperCase() : '';
                if (isNaN(rank) || pos === 'K' || pos === 'DST' || pos === 'DEF') continue;
                entries2.push({ name, rank });
              }
              // Patch rv into existing dp entries
              entries2.forEach(e => {
                const k = norm(e.name);
                const rv = rankToVal(Math.round(e.rank), entries2.length);
                if (out.dp[k]) out.dp[k].rv = rv;
                else out.dp[k] = { dv: 0, dv_sf: 0, rv, name: e.name };
              });
              console.log('DynastyProcess ECR: patched rv for ' + entries2.length + ' players');
            } catch(e) { console.error('DynastyProcess ECR failed:', e.message); }

            fs.writeFileSync('rankings.json', JSON.stringify(out));
            console.log('\nrankings.json written — sources: fc=' + Object.keys(out.fc).length + ' ktc=' + Object.keys(out.ktc).length + ' ffc=' + Object.keys(out.ffc).length + ' dp=' + Object.keys(out.dp).length);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json rankings.json
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit"
          else
            git commit -m "chore: update players + rankings [$(date -u +%Y-%m-%d)]"
            git push
          fi
